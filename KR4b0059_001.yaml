body:
  text: 樂府釣竿篇釣舟畫彩鷁漁子服冰紈金轄茱萸網銀鉤翡翠竿歛橈隨水脈急槳渡江湍湍長自不辭前浦有佳期船交橈影合浦深魚出遲荷根時觸餌菱芒乍罥絲蓮度江南手衣渝京兆眉垂竿自有樂誰能為太師文苑英華二百十樂府詩集十八詩紀八十七又類聚四十一作劉孝威釣竿篇引紈竿湍辭期遲六韻夜聽妓賦得烏夜啼夜聽妓賦得烏夜啼鵾絃且輟弄鶴操暫停徽別有啼烏曲東西相背飛倡人怨獨守蕩子遊未歸若逢生離唱長夜泣羅衣玉臺新詠八類聚四十二作賦得烏夜啼詩文苑英華二百六樂府詩集四十七並作烏夜啼詩紀八十七銅雀妓雀臺三五日弦吹似佳期況復西陵晚松風吹繐帷危絃斷復續妾心傷此時誰言留客袂還掩望陵悲類聚三十四作銅雀臺妓文苑英華二百四樂府詩集三十一詩紀八十七班婕妤怨班婕妤怨應門寂已閉非復後庭時況在青春日萋萋綠草滋妾身似秋扇君恩絕履綦詎憶遊輕輦從今賤妾辭文苑英華二百四樂府詩集四十三詩紀八十七三婦豔大婦縫羅裙中婦料繡文唯餘最小婦窈窕舞昭君丈人慎勿去聽我駐浮雲樂府詩集三十五詩紀八十七櫂歌行日暮楚江上江深風復生所思竟何在相望徒盈盈舟子行催棹無所喝流聲樂府詩集四十詩紀八十七詠風詠風嫋嫋秋聲習習春吹鳴茲玉樹渙此銅池羅幃自舉襟袖乃披慚非楚侍濫賦雄雌類聚一文苑英華百五十六萬花谷二詩紀八十七侍宴清宴延多士鴻漸濫微薄臨炎出蕙樓望辰躋菌閣上征切雲漢俛眺周京洛城寺鬱參差街衢紛漠漠禁林寒氣晚方秋未搖落皇心重發志賦詩追並作自昔承天寵於茲被人爵選言非綺綃何以儷金雘類聚三十九文苑英華百六十九詩紀八十七又茲堂乃峭嶠伏檻臨曲池樹中望流水竹裏見攢枝欄高景難蔽岫隱雲易垂邂逅逢休幸朱蹕曳青規丘山不可答葵藿空自知類聚三十九文苑英華百六十九詩紀八十七三日侍華光殿曲水宴薰袚三陽暮濯褉元巳初皇心睠樂飲帳殿臨春渠豫遊高夏諺凱樂盛周居復以焚林日丰茸花樹舒羽觴環階轉清瀾傍席疏妍歌已嘹亮妙舞復紆餘九成變絲竹百戲起龍魚類聚四初學記四古今歲時雜詠十六文苑英華百七十二詩紀八十七三日侍安成王曲水宴三日侍安成王曲水宴匯澤良孔殷分區屏中縣躡跨兼流采襟喉邇封甸吾王奄酆畢析珪承羽傳不資魯俗移何待齊風變東山富遊士北土無遺彥一言白璧輕片善黃金賤餘辰屬上巳清袚追前諺侍此頻豫遊復展城隅宴芳洲亘千里遠近光風扇方歡厚德重誰言薄遊倦類聚四初學記四古今歲時雜詠十六詩紀八十七春日從駕新亭應制旭日輿輪動言追河曲遊紆餘出紫陌迤邐度青樓前驅掩蘭徑後乘歷芳洲春色江中滿日華巖上留江風傳葆吹巖華映采斿臨渦起睿作駟馬暫停輈侍從榮前阮雍容慚昔劉空然等彈翰非徒嗟未遒文苑英華百七十八詩紀八十七侍宴集賢堂應令北閣時既啟西園又已闢宮屬引鴻鷺朝行命金碧伊臣獨何取隆恩徒自昔布武登玉墀委坐陪瑤席綢繆參宴笑淹留奉觴醳壺人告漏晚煙霞起將夕反景入池林餘光映泉石類聚三十九文苑英華百七十九詩紀八十七侍宴餞庾於陵應詔皇心眷將遠帳餞靈芝側是日青春獻林塘多秀色芳卉疑綸組嘉樹似雕飾遊絲綴鶯領光風送綺翼下輦朝既盈留宴景將昃高辯競談端奇文爭筆力伊臣獨無伎何用奉吹息類聚二十九文苑英華六十九詩紀八十七侍宴餞張惠紹應詔滄池誠自廣蓬山一何峻麗景花上鮮油雲葉裏潤風度餘芳滿鳥集新條振餞言班俊造光私獎輶吝徒然謬反隅何以窺重仞類聚二十九文苑英華百六十九詩紀八十七餞張惠紹應令鮮雲積上月凍雨晦初陽迴風飄淑氣落景煥新光竹萌始防露桂挺已含芳瑤階變杜若玉沼發攢蔣聖襟惜歧路曲宴闢蘭堂類聚二十九作應令詩文苑英華百七十九作餞張惠詔應令詩紀八十七侍宴離亭應令轘轅東北望江漢西南永羽旗映日移鐃吹臨風警令王愍追送纚舟宴俄頃掩袂眺征雲銜杯惜餘景首燕徒有心局步何由騁類聚二十九作侍離宴詩文苑英華百七十九詩紀八十七奉和昭明太子鍾山解講御鶴翔伊水策馬出王田我后遊袛鷲比事實光前翠蓋承朝景朱旗曳曉煙樓帳縈巖谷緹組曜林阡況在登臨地復及秋風年喬柯變夏葉幽澗潔涼泉停鑾對寶座辯論悅人天淹塵資海滴昭暗仰燈然法朋一已散笳劍儼將旋邂逅逢優渥託乘侶才賢摛辭雖並命遺恨獨終篇弘明集三十詩紀八十七和湘東王理訟馮翊亂京兆廣漢欲兼治豈若兼邦牧朱輪褰素帷淮海封畿地雜俗良在茲禁姦擿銖兩馭黠震豺狸類聚五十詩紀八十七陪徐僕射晚宴夫君追宴喜十日遞來過築室華池上開軒臨芰荷方塘交密篠對霤接繁柯景移林改色風去水餘波洛城雖半掩愛客待驪歌類聚三十九作陪徐僕射晚宴於兒宅初學記十四文苑英華二百十四作同集晉安兒宅詩紀八十七上虞鄉亭觀濤津渚學潘安仁河陽縣詩上虞鄉亭觀濤津渚學潘安仁河陽縣詩昔余筮賓始衣冠仕洛陽無貲徒有任一命忝為郎再踐神仙側三入崇賢旁東朝禮髦俊虛薄廁才良遊談侍名理搦管創文章引籍陪下膳橫經參上庠誰謂服事淺契闊變炎涼一朝謬為吏結綬去承光烹鮮徒可習治民終未長化雞仰季智馴雉推仲康此城鄰夏穴橚矗茂筠篁孝碑黃絹語神濤白鷺翔遨遊佳可望釋事上川梁秋江凍雨絕反景照移塘纖羅殊未動駭水忽如湯乍出連山合時如高蓋張漂沙黃沫聚礐石素波揚榜人不敢唱舟子詎能航離家復臨水眷然思故鄉中來不可絕奕奕苦人腸泝洄若無阻謝病反清漳文苑英華百六十二詩紀八十七又說文繫傳言部引塘一韻太子洑落日望水太子洑落日望水川平落日迥落照滿川漲復此淪波地派別引沮漳耿耿流長脈熠熠動微光寒烏逐查漾饑鵜拂浪翔臨泛自多美況乃還故鄉榜人夜理楫櫂女闇成粧欲待春江曙爭塗向洛陽何水部集二作落日望水初學記六文苑英華百六十三又詩紀八十七類聚八引漲漳光粧陽六韻登陽雲樓吾登陽臺上非夢高唐客回首望長安千里懷三益顧帷慚入楚降私等申白西沮水潦收昭丘霜露積龍門不可見空慕凌寒柏類聚六十三初學記二十四文苑英華三百十一詩紀八十七夕逗繁昌浦日入江風靜安波似未流岸迴知舳轉解纜覺船浮暮煙生遠渚夕鳥赴前洲隔山聞戍鼓傍浦喧棹謳疑是辰陽宿於此逗孤舟文苑英華百六十四詩紀八十七又類聚二十七引流洲二韻櫟口守風春心已應豫歸路復當歡如何此日風霾曀駭波瀾倏見搖心慘俄瞻鄉路難賴有同舟客移宴息層巒華茵藉初卉芳樽散緒寒謔浪雖云善江流苦未安何由入故園詎即紉新蘭寄謝浮丘子暫欲假飛鸞何水部集二詩紀八十七還渡浙江還渡浙江季秋弦望後輕寒朝夕殊商人泣紈扇客子夢羅襦憂來自難遣況復阻川隅日暮愁陰合繞樹噪寒烏濛漠江煙上蒼茫沙嶼蕪解纜辭東越接軸騖西徂懸帆似馳驥飛棹若驚鳧言歸遊俠窟方從冠蓋衢類聚二十七文苑英華百六十二作渡浙江詩紀八十七江津寄劉之遴與子如黃鵠將別復徘徊經過一柱觀出入三休臺共摛雲氣藻同舉霞紋杯佳人每曉遊禁門恆晚開欲寄一言別高駕何由來類聚二十九文苑英華二百四十七詩紀八十七發建興渚示到陸二黃門發建興渚示到陸二黃門扁舟去平樂還顧極川梁猶聞棗下吹尚識杏間堂洛橋分曲渚官寺隱回塘客行裁跬步即事已多傷況復千餘里悲心未遽央類聚二十九文苑英華二百八十六詩紀八十七酬陸長史倕王粲始一別猶且歎風雲況余屢之遠與子亟離群如何持此念復為今日分分悲宛如昨弦望殊揮霍行舟雖不見行程猶可度度君路應遠期寄新詩返相望且相思勞朝復勞晚薄暮閽人進果得承芳信殷勤覽妙書留連披雅韻冽洲財賦總慈山行旅鎮已切臨睨情遽動思歸引歸歟不可即前途方未極覽諷欲諼誚研尋還慨息來喻勗雕金比質非所任虛薄無時用徘徊守故林屏居青門外結宇灞城陰竹庭已南映池牖復東臨喬柯貫簷上垂條拂戶陰條開風暫入葉合影還沈帷屏溽早露階霤擾昏禽衡門謝車馬賓席簡衣簪雖愧陽陵曲寧無流水琴蕭條聊屬和寂寞少知音平生竟何托懷抱共君深一朝四美廢方見百憂侵曰余濫官守因之泝廬久水接淺原陰山帶荊門右從容少職事疲病疎僚友命駕獨尋幽淹留宿廬阜廬阜擅高名岧岧凌太清舒雲類紫府標霞同赤城北上輪難進東封馬易驚未若茲山險車騎息逢迎山橫路似絕徑側樹如傾蒙籠乍一啟磥硊無暫平倚巖忽迴望援蘿遂上征乍觀秦帝石復憩周王城交峰隱玉霤對㵎距金楹風傳鳳臺琯雲渡洛賓笙紫書時不至丹爐且未成無因追羽翮及爾宴蓬瀛蓬瀛不可託悵然反城郭時過馬鳴院偶憩鹿園閣既異人世勞聊比化城樂影塔圖花樹經臺總香藥月殿曜朱旛風輪和寶鐸園楥即重嶺階基仍巨壑朝猨響甍棟夜水聲帷薄餘景鶩登臨方宵盡談謔談謔有名僧慧義似傳燈遠師教逾闡生公道復弘小乘非汲引法善招報能積迷頓已悟為懽得未曾為懽誠已往坐臥猶懷想況復心所積茲地多諧賞惜哉無輕軸更泛輪湖上可思不可見離念空盈蕩賈生傅南國平子相東阿優游匡贊罷縱橫辭賦多方才幸同貫無令絕詠歌幽谷雖云阻煩君計吏過文苑英華二百四十詩紀八十七答何記室答何記室遊子倦飄蓬瞻途杳未窮晨征凌迸水暮宿犯頹風出洲分去燕向浦逐歸鴻蘭芽隱陳葉荻苗抽故叢忽憶園間柳猶傷江際楓吾生棄武騎高視獨辭雄既殫孝王產兼傾卓氏僮罷籍睢陽囿陪謁建章宮紛余似鑿枘方圓殊未工黑貂久自弊黃金屢已空去辭追楚穆還耕偶漢馮巧拙良為異出處嗟莫同若厭蘭臺右見訪灞陵東何水部集二作仰答何記室文苑英華二百四十作答何記室遜詩紀八十七答張左西相思如三月相望非兩宮持此連枝樹暫作背飛鴻若人惠思我摛藻蔚雕蟲仙掌方晞露靈烏正轉風方假排虛翮相與北山叢類聚三十一文苑英華二百四十詩紀八十七歸沐呈任中丞昉步出金華省還望承明廬壯哉宛洛地佳麗實皇居虹蜺拖飛閣蘭芷覆清渠圓淵倒荷芰方鏡寫簪裾白雲夏峰盡青槐秋葉疎自我從人爵蟾兔屢盈虛殺青徒已汗司舉未云書文昌愧通籍臨邛幸第如夫君多敬愛蟠木濫吹噓時時釋簿領騶駕入吾廬自唾誠䃤砆無以儷璠璵但願長閒暇酌醴薦焚魚文苑英華二百四十七作歸沐呈任中丞昉注云時為著作郎詩紀八十七又類聚三十一作贈任中丞引廬居渠疏魚五韻憶虞弟憶虞弟下邑非上郡徒然想二馮余慚野王德爾勗聖鄉風望望餘塗盡悽悽良宴終朝蔬一不共夜被何由同類聚二十一詩紀八十七淇上人戲蕩子婦示行事一首淇上人戲蕩子婦示行事一首桑中始奕奕淇上未湯湯美人要雜佩上客誘明璫日闇人聲靜微步出蘭房露葵不待勸鳴琴無暇張翠釵挂已落羅衣拂更香如何嫁蕩子春夜守空床不見青絲騎徒勞紅粉粧玉臺新詠八類聚十八作淇上戲蕩子婦詩紀八十七愛姬贈主人臥久疑粧脫鏡中私自看薄黛銷將盡凝朱半有殘垂釵繞落鬢微汗染輕紈同羞不相難對笑更成歡妾心君自解挂玉且留冠類聚十八詩紀八十七為人贈美人為人贈美人巫山薦枕日洛浦獻珠時一遇便如此寧關先有期幸非使君問莫作羅敷辭夜長眠復坐誰知闇歛眉欲寄同花燭為照遙相思類聚十八詩紀八十七遙見鄰舟主人投一物眾姬爭之有客請余為詠遙見鄰舟主人投一物眾姬爭之有客請余為詠河流既浼浼河鳥復關關落花浮浦出飛雉度洲還此日倡家女競嬌桃李顏良人惜美珥欲以代芳菅新縑疑故素盛趙蔑衰班曳綃爭掩縠搖佩奮鳴環客心空振蕩高枝不可攀玉臺新詠八類聚十八作見鄰舟人投一物眾姬爭之詩詩紀八十七古意古意燕趙多佳麗白日照紅粧蕩子十年別羅衣雙帶長春樓怨難守玉階空自傷復此歸飛燕銜泥繞曲房差池入綺幕上下傍雕梁故居猶可念故人安可忘相思昏望絕宿昔夢容光魂交忽在御轉側定他鄉徒然顧枕席誰與同衣裳空使蘭膏夜炯炯對繁霜文苑英華二百五詩紀八十七又類聚三十二引粧長傷房梁忘裳霜八韻報王永興觀田重門寂已暮案牘罷囂塵輕涼生筍席微風起扇輪浮瓜聊可貴溢酒亦成珍復有寒泉井兼以瑩心神睠彼忘言客閒居伊洛濱顧已慚困地徒知薑桂辛但願崇明德無謂德無鄰類聚六十五詩紀八十七詠有人乞牛舌乳不付因餉檳榔詩陳乳何能貴爛舌不成珍空持渝皓齒非但汗丹唇別有無枝實曾要湛上人羞比朱櫻熟詎易紫梨津莫言蔕中久當看心裏新微芳雖不足含咀願相親類聚八十七詩紀八十七夜不得眠夜長愁反覆懷抱不能裁披衣坐惆悵當戶立徘徊風音觸樹起月色度雲來夏葉依窗落秋花當戶開光陰已如此復持憂自催類聚三十五詩紀八十七望月有所思秋月始纖纖微光垂步簷朣朧入床簟髣髴鑒窗簾簾螢隱光息簾蟲映光織玉羊東北上金虎西南昃長門隔清夜高堂夢容色如何當此時懷情滿胸臆類聚一文苑英華百五十二詩紀八十七校書秘書省對雪詠懷校書秘書省對雪詠懷桂華殊皎皎柳絮亦霏霏詎比咸池曲飄颻十里飛恥均班女扇羞儷曹人衣浮光亂粉壁積照朗彤闈鶺鴒搖羽至鵯鶋拂翅歸相彼猶自得嗟余獨有違終朝守玉署方夜勞石扉未能奏緗綺何由辨國圍坐銷風露質遊聯珠璧暉偶懷笨車是良知高蓋非既言謝端木無為陳巧機文苑英華辨證六詩紀八十七又類聚二初學記二文苑英華百五十四並作對雪詩引霏飛衣闈四韻詠百舌詠百舌山人惜春暮旭旦坐花林復值懷春鳥枝間弄好音遷喬聲迥出赴谷響幽深乍聽長而短時聞絕復尋孤鳴若無對百囀似群吟昔聞屢歡昔今聽忽悲今聽聞非殊異遲暮獨傷心類聚九十二文苑英華三百二十九作劉孝緯詩紀八十七侍宴同劉公幹應令侍宴同劉公幹應令副君西園宴陳王謁帝歸列位華池側文雅縱橫飛小臣輕蟬翼黽勉謬相追置酒陪朝日淹留望夕霏初學記十四詩紀八十七賦詠百論捨罪福詩尋因途乃異及捨趣猶并苦極降歸樂樂極苦還生豈非輪轉愛皆緣封著情一知心相濁樂染法流清廣弘明集三十詩紀八十七賦得照棊燭刻五分成賦得照棊燭刻五分成南皮弦吹罷終奕且留賓日下房櫳暗華燭命佳人側光全照局回花半隱身不辭纖手倦羞令夜向晨玉臺新詠八初學記二十五作賦照棊燭詩詩紀八十七同武陵王看妓同武陵王看妓燕姬奏妙舞鄭女發清歌迴羞出慢臉送態表嚬蛾寧殊遇行雨詎減見凌波想君愁日落應羨魯陽戈玉臺新詠七作武陵王紀同蕭長史看妓初學記十五文苑英華二百十三作武陵殿下看妓萬花谷後三十二作劉孝綽詩詩紀八十七賦得遺所思遺簪雕玳瑁贈綺織鴛鴦未若華滋樹交枝蕩子房別前秋已落別後春更芳所思不可寄唯憐盈袖香玉臺新詠八詩紀八十七林下映月林下映月明明三五月垂影當高樹攢柯半玉蟾裛葉彰金兔茲林有夜坐嘯歌無與晤側光聊可書含毫且成賦類聚一文苑英華百五十二作林下月影注云集本類聚並作映月詩紀八十七又初學記一作林下月影引樹兔二韻詠素蝶隨蜂遶綠蕙避雀隱青薇映日忽爭起因風乍共歸出沒花中見參差葉際飛芳華幸勿謝嘉樹欲相依初學記三十詩紀八十七於座應令詠梨花玉稱津潤金谷詠芳菲詎匹龍樓下素蕊映華扉雜雨疑霰落因風似蝶飛豈不憐飄墜願入九重闈類聚八十六作詠梨花應令初學記二十八詩紀八十七秋雨臥疾賈君徭役少潘生民務稀及此同多暇高臥掩重闈寂寂桑榆晚滂沱曀不晞電隙時光帳風簾乍扣扉類聚二文苑英華百五十三詩紀八十七春宵春宵猶自長春心非一傷月帶圓樓影風飄花樹香誰能對雙燕暝暝守空床類聚三十二詩紀八十七冬曉冬曉風正寒偏念客衣單臨粧罷鉛黛含淚剪綾紈寄語龍城下詎知書信難同上月半夜泊鵲尾月半夜泊鵲尾客行三五夜息棹隱中洲月光隨浪動山影逐波流類聚二十七詩紀八十七和詠歌人偏得日照詩獨明花裏翠偏光粉上津屢將歌罷扇廻拂影中塵初學記十五萬花谷後三十二作劉孝綽詩詩紀八十七詠姬人未肯出帷開見釵影簾動聞釧聲徘徊定不出常羞華燭明類聚十八詩紀八十七遙見美人採荷菱莖時繞釧棹水或沾粧不辭紅袖濕唯憐綠葉香玉臺新詠十詩紀八十七詠小兒採菱採菱非採菉日暮且盈舠踟躕未敢進畏欲比殘桃玉臺新詠十詩紀八十七詠眼含嬌𥊑已合離怨動方開欲知密中意浮光逐笑迴類聚十七詩紀八十七擬古少知雅琴曲好聽雅琴聲雅琴不可聽一聽一沾纓何水部集詩紀八十七詠日應令詠日應令弭節馳暘谷照檻出扶桑園葵亦何幸傾葉奉離光類聚一初學記一文苑英華百五十一詩紀八十七又海錄碎事一引光一韻望月輪光缺不半扇影出將圓流光照漭瀁波動映淪漣類聚一詩紀八十七秋夜詠琴上宮秋露結上客夜琴鳴幽蘭暫罷曲積雪更傳聲初學記十六文苑英華二百十二萬花谷後三十二作劉孝綽詩賦得始歸鴈洞庭春水綠衡陽旅鴈歸差池高復下欲向龍門飛類聚九十一初學記二十萬花谷後四十作劉孝綽詩詩紀八十七劉孝綽元廣州景仲座見故姬一首留故夫不歭𣦠別待春山上相看采蘼蕪玉臺新詠九詩紀八十七
