body:
  text: 卷二為鄱陽嗣王初讓雍州表臣聞大邦維屏既慚宗子之詩思樂泮宮有缺僖公之頌特以周興九伯錫壤參虛漢啟二河分珪舊楚自私家慶總集微躬雍部襟帶跨制數州西拒嶢關北跨鄧塞雖復呼韓來朝槀街納質二虜尋戈四郊無警猶當王戎雅識羊祜尚義臣退求諸己無或宴安進思盡忠幾乎私竭初學記十東宮禮絕傍親議案張鏡撰東宮儀記稱三朝發哀者踰月不舉樂鼓吹寢奏服限亦然尋傍絕之義義在去服服雖可奪情豈無悲鐃歌輟奏良亦為此既有悲情宜稱兼慕卒哭之後依常舉樂稱悲竟此理例相符謂猶應稱兼慕請至卒哭梁書昭明太子傳南史五十三送瑞鼎詣相國梁公啟生木遊火之禽夾階紀朔之華白環銀瓮之迹素雉金船之瑞自天有祚不為定於郟鄏虛其所止非獨在於汾陰藝文類聚九十九謝為東宮奉經啟皇太子四術夙知三善非學猶復旁求儒雅應物稽疑業光夏校德茂周序諸侯宋魯於焉觀則參陪盛禮莫匪國華臣雖職典經圖而同官不一推擇而舉尚多髦俊寵光曲被獨在選中他日朝聞猶甘夕死況茲恩重彌見生輕藝文類聚五十五初學記二十一求豫北伐啟或以臣素無飛將之目未從嫖姚之伍言易行難收功理絕然桓沖稱謝安無將略文靖公遂破苻堅山濤謂羊祜不強建成侯卒平孫皓微臣之譬兩賢誠無等級小虜之方二寇勢踰枯朽藝文類聚五十九謝西中郎諮議啟謝西中郎諮議啟臣不能銜珠避顛傾柯衛足以茲疏倖與物多忤兼逢匿怨之友遂居司隸之官交構是非用成萋斐日月昭回俯明枉直獄書每御輒鑒蔣濟之冤炙髮見明非關陳正之辯遂漏斯密網免彼嚴棘得使還同士伍比屋唐民生死骨肉豈侔其施臣誠無識敦不戴天疏遠畝隴絕望高闕而降其接引優以旨喻於臣微物足為榮隕況剛條落葉忽沾雲露周行所寘復齒盛流但雕朽杇糞徒成延獎捕影繫風終無效荅梁書劉孝綽傳謝東宮啟謝東宮啟臣聞之先聖以眾惡之必察焉眾好之必察焉豈非孤特則積毀所歸比周則積譽斯信知好惡之閒必待明鑒故晏嬰再為阿宰而前毀後譽後譽出於阿意前毀由於直道是以一犬所噬旨酒貿其甘酸一手所搖嘉樹變其生死又鄒陽有言士無賢愚入朝見嫉至若臧文之下展季靳尚之放靈均絳侯之排賈生平津之陷主父自茲厥後其徒實繁曲筆短辭不暇殫述寸管所窺常由切齒殿下誨道觀書俯同好學前載枉直備該神覽臣昔因立侍親承緒言飄風貝錦譬彼讒慝聖旨殷勤深以為歎臣資愚履直不能杜漸防微曾未幾何逢訧罹難雖吹毛洗垢在朝而同嗟而嚴文峻法肆姦其必奏不顧賣友志欲要君自非上帝運超己之光昭陵陽之虐舞文虛謗不取信於宸明在縲嬰纏幸得蠲於庸暗裁下免黜之書仍頒朝會之旨小人未識通方縶馬懸車息絕朝覲方願滅影銷聲遂移林谷不悟天聽罔已造次必彰不以距違見疵復使引籍雲陛降寬和之色垂布帛之言形之千載所蒙已厚況乃恩等特召榮同起家望古自惟彌覺多忝但未渝丹石永藏輪軌相彼工言構茲媒諓且款冬而生已凋柯葉空延德澤無謝陽春梁書劉孝綽傳謝安成王賚祭孤石廟胙肉啟味過瀹鳳珍越屠龍故使屏翳收風馮夷淨浪神居鷁首獨汎安流民幸同附得徵遘迕復等受釐預頒純嘏恩靈所降信次委積報生以死竊聞斯義藝文類聚七十二謝晉安王餉米酒等啟謝晉安王餉米酒等啟傳詔李孟孫宣教旨垂賜米酒瓜筍葅脯酢茗八種氣苾新城味芳雲松江潭抽節邁昌荇之珍壃埸擢翹越葺精之美羞非純束野麕裛似雪之驢鮓異陶瓶河鯉操如瓊之粲茗同食祭酢類望甘免千里宿舂省三月種聚小人懷惠大懿難忘茶經謝給藥啟一物之微遂留膏肓名醫上藥爰自城府雖巫咸視診岐伯下鍼松子玉漿衛卿雲液比妙眾珍實云多愧藝文類聚八十一謝越布啟比納方綃既輕且麗珍邁龍水妙越島夷藝文類聚八十五荅湘東王書荅湘東王書伏承自辭皇邑爰至荊臺未勞刺舉且摛高麗近雖預觀尺錦而不覩金玉昔臨淄詞賦悉與楊修未殫寶笥顧慚先哲渚宮舊俗朝衣多故李固之薦二賢徐璆之奏五郡威懷之道兼而有之當欲使金石流功恥用翰墨垂迹雖乖知二偶達聖心爰自退居素里卻埽窮閈比楊倫之不出譬張摯之杜門昔趙卿窮愁肆言得失漢臣鬱志廣敘盛衰彼此一時擬其非匹竊以文豹何辜以文為罪由此而談又何容易故韜翰吮墨多歷寒暑既闕子幼南山之歌又微敬通渭水之賦無以自同獻笑少酬襃誘且才乖體物不擬作於玄根事殊宿諾寍貽懼於朱亥顧己反躬載懷累息但瞻言漢廣邈若天涯區區一心分宵九逝殿下降情白屋存問相尋食椹懷音矧伊人矣梁書劉孝綽傳又略見藝文類聚五十八與弟書方弘游典墳寤歌林㵎覽興衰於千載觀榮落於四時歲時紀要荅雲法師書孝綽和南辱誨垂示敕旨所荅劉太僕思效啟義窮深遠語兼巧便伏聞希有身心踴躍昔戈盾夾車備不虞於周后兵旗引駕防未然於漢君斯皆執心黃屋瑞無紺馬事極寰㝢之中理隔天人之外皇上自茲善覺降迹閻浮以住地之心行則天之化故能慈導三有仁濟萬物猶以法藥未周寶船不倦解劍卻蓋躬詣道場瑞花承足人觀雕輦之盛金輪啟路物覩重英之飾顯實開權事均祇鷲本無四畏寍慮五怨思效遂膚引梁丘隨劍之說日殫觸瑟之辭何異迴龍象於兔徑注江海於牛迹聖旨慇懃曲相誘喻豈直淨一人之垢衣將以破群生之暗室弟子世傳正見幼覩真言但惑網所縈塵勞自結微因宿植仰逢法教親陪寶座預餐香鉢復得俱聽一音共聞八解庶因小葉受潤大雲猥蒙開示深自慶幸不勝歡喜略附陳誠劉孝綽和南釋藏策五廣弘明集二十八上昭明太子集序臣竊觀大易重明之象著焉抑又聞之匕鬯之義存焉故書有孟侯之名記表元良之德歷選前古以洎夏周可得而稱啟誦而已雖徹聖挺賢光乎二代高文精義闃爾無聞漢之顯宗晉之肅祖昔自春宮益好儒術或專經止於區易或持論窮於貞假子桓雖摛藻銅省集講肅成事在藩儲理非皇貳未有正位少陽多才多蓺者也粵我大梁之二十一載盛德備乎東朝若乃有縱自天惟睿作聖顯仁立孝行於四海如珪如璋不因琢磨之義為臣為子寍待觀喻之言惟性道難聞而文章可見故俯同志學用晦生知以弦誦之餘辰總鄒魯之儒墨徧綈緗於七閣彈竹素於九流地居上嗣實副元首皇帝垂拱巖廊委咸庶績時非從守事或監撫雖一日二日攝覽萬機猶臨書幌而不休對欹案而忘怠況復延納侍講討論經紀去聖滋遠愈生穿鑿枝分葉散殊路偆馳靈臺辟雍之疑禋宗祭社之繆明章申老之議通顏理王之說量覈然否剖析同異察言抗論窮理盡微於時淹中稷下之生金華石渠之士莫不過衢樽而挹多少見斗極而曉西東與夫盡春卿之道贊仲尼之宅非賈誼於蘇林問蕭何於棗據區區前史不亦恧歟加以學貫總持辨同無硋五時密教見猶鏡象一乘玅旨觀若掌珠及在布金之園處如龍之眾開示有空顯揚權實是以徧動六地普雨四花豈直得解瓔須提舍鉢瓶沙騰曇言德梵志依風而已哉若夫天文以爛然為美人文以煥乎為貴是以隆儒雅之大成遊雕蟲之小道握牘持筆思若有神曾不斯須風飛雷起至於宴遊西園祖道清洛三百載賦該極連篇七言致擬見諸文學博逸興詠並命從遊書令視草銘非潤色七窮煒燁之說表極遠大之才皆喻不備體詞不掩義因宜適變曲盡文情竊以屬文之體鮮能周備長卿徒善既累為遲少孺雖疾俳優而已子淵淫靡若女工之蠹子雲侈靡異詩人之則孔璋詞賦曹祖勸其修今伯喈答贈摯虞知其頗古孟堅之頌尚有似贊之譏士衡之碑猶聞類賦之貶深乎文者兼而善之能使典而不埜遠而不放麗而不淫約而不儉獨擅眾美斯文在斯假使王朗報箋卞蘭獻頌猶不足以揄揚著述稱贊才章況在庸才曾何仿彿然承華肇建濫齒時髦居陪出從逝將二紀譬彼登山徒仰峻極同夫觀海莫際波瀾但職官書記預聞盛藻歌詠不足敢忘編次謹為一帙十卷第目如左日升松茂與天地而偕長壯思英詞隨歲月而增廣如其後錄以俟賢臣司空安成康王碑銘昔者重華文命並冑高陽之苗豐邑舂陵俱纂帝堯之緒而虞夏革運姚姒之姓已分高光再興大漢之名無改如我皇家梁齊代建異文叔之紹開起自王族非伯禹之更姓公則本枝別榦誕自河嶽五百之期實膺命世卜商有問是謂色難承志望顏在公斯易至如文琰之對食餘幼權之言爵里衛子之朗月映山杜生之凝脂點漆惟公具美歷駕前修峨峨焉非嶽陵之所至浩浩焉總江漢而為長故能擊水三千摶風九萬排天闕而俯眡掩浮雲而上征皇帝甄名挺聖河洛有徵握衡含樞奄一時夏利建藩屏固葉深根郕霍酆郇方周啟祚封公為安成王食邑二千戶允同衛叔賜寶器於商郊殊異唐侯戲桐珪於汾水乃拜公為平西將軍荊州刺史楚之對齊屈完引城池之固荊之比宋墨翟陳輦路之殊品金作貢不異淮海珠璣犀象又無求於晉國況以雲夢九百之宏侈章華三休之巨麗公禦煩以寡居高而降執沖虛之道無矜滿之情其為政也莊敬足以範物慈惠足以庇民剛毅足以威暴清貞足以勵俗天監十七年薨春秋四十有五凡我庶民竊親高義況復祗承帝命來仕王家兔園晚春叨從者之賜高唐暮天而奉作賦之私常懼慶雲之惠不酬而搖落奄至豈謂輕塵之效莫展而峻極先穨思所以立言貞石貽厥長世銘曰昔在文韶五賢二聖漢藩魏屏微風不競於赫我梁德符姬姓康王康叔異時同盛爰自妙年令問不已一孝一悌實光行始義府文場詞人髦士波瀾莫際牆仞難窺用茲先覺導此後知德大心小居高志卑再握不倦三吐忘疲飛龍在天肇基宛瀆地猶小胏民同世復皇情睠正屬難推轂允矣宗英移藩改牧誰謂路永江漢已浮彼蒼不惠遽反成周川迴泝軸塗引歸旒藝文類聚四十七栖隱寺碑開方便門示真實相置甘露室遵甘露津苦語軟言隨方弘訓俯心降迹逐物重輕中枝小葉各隨業根愍其四流五結有來而不散八慢九邪一淪而莫曉如彼醫王等之藥樹去聖茲遠思聖茲深誠敬所先是歸龕廟自妙法東注寶化西漸公卿貴士賢哲偉人莫不嚴事招提歸仰慧覺欲使法燈永傳勝因長久銘曰給孤焚蕩善勝崩淪堂堂宗匠克紹慧因地雖舊域其宇惟新召棠且思羊碑猶泣況我仁祠義喻生立遺愛伊何形于南邑亦有庶民經始攸急珠殿連雲金層輝景衢交達巷門臨樹屏五居推妙三空愧靜銘施柱側記法窟前孰云千載餘迹方傳敢宣重說敬勤雕鐫芬域未滅斯文在旃藝文類聚七十七
